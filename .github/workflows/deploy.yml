name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests before deploy
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to EC2 Mumbai
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 300s
          script: |
            set -e
            cd /home/ubuntu/gstsense

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building and restarting backend..."
            docker compose build backend celery_worker
            docker compose up -d --no-deps backend celery_worker

            echo "==> Running database migrations..."
            docker compose exec -T backend alembic upgrade head

            echo "==> Restarting nginx..."
            docker compose restart nginx

            echo "==> Waiting for health check..."
            sleep 15
            curl -fsS http://localhost:8000/health | grep -q '"status":"healthy"'

            echo "==> Deploy complete."

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Deployment failed. Check the Actions tab for details.'
            })
