name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — 60 pytest tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gstsense_test
          POSTGRES_USER: gstsense
          POSTGRES_PASSWORD: gstsense_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://gstsense:gstsense_test_pass@localhost:5432/gstsense_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: test-secret-key-not-for-production-use-only
      JWT_SECRET_KEY: test-jwt-secret-key-not-for-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "30"
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret
      AWS_REGION: ap-south-1
      AWS_S3_BUCKET: gstsense-test-bucket
      RAZORPAY_KEY_ID: rzp_test_fake
      RAZORPAY_KEY_SECRET: fake_razorpay_secret_32chars_padded
      RAZORPAY_WEBHOOK_SECRET: fake_webhook_secret_32chars_padded
      ANTHROPIC_API_KEY: sk-ant-fake
      OPENAI_API_KEY: sk-fake
      RESEND_API_KEY: re_fake
      INTERAKT_API_KEY: fake
      FROM_EMAIL: test@gstsense.in
      SENTRY_DSN: ""
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: '["http://localhost:3000"]'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run pytest
        run: |
          pytest tests/ -v \
            --tb=short \
            --junitxml=pytest-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: backend/pytest-results.xml

  frontend-typecheck:
    name: Frontend — TypeScript check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint
        continue-on-error: true
